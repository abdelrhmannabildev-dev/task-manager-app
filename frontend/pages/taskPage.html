<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/privateTasks.css">
    <link rel="stylesheet" href="../css/taskPage.css">
    <title>Task Manger</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="privateTasks.html">Your Tasks</a></li>
                <li><a href="publicTasks.html">Company Tasks</a></li>
                <li><a href="auth.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="taskDetails">
            <div class="hero">
                <button class="back" id="back"></button>
                <div class="title"></div>
                <div class="actions">
                    <div class="edit" id="edit"></div>
                    <div class="delete" id="delete"></div>
                </div>
            </div>
            <div class="taskBody">
                <div class="description"></div>
                <div class="status"></div>
                <div class="priority"></div>
                <div class="date"></div>

            </div>
            <div class="notes"></div>
        </div>
        <div class="editForm hidden">
            <form class="form">
                <input type="text" placeholder="Task Name" class="taskName">
                <input type="text" placeholder="Task Description" class="taskDescription">
                <input type="text" placeholder="Task Notes" class="taskNotes">
                <div class="priorityGroup">
                    <input type="radio" name="priority" id="low" value="low">
                    <label for="low">Low</label>

                    <input type="radio" name="priority" id="medium" value="medium">
                    <label for="medium">Medium</label>

                    <input type="radio" name="priority" id="high" value="high">
                    <label for="high">High</label>
                </div>
                <button class="saveTask" type="submit">Save Task</button>
                <button class="cancel">Cancel</button>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; <script>document.write(new Date().getFullYear());</script> Task Manger. All rights reserved.</p>
    </footer>
    <!-- <script type="module" src="../js/tasks/taskPageUi.js"></script> -->
    <script type="module" src="../js/tasks/taskPage.js"></script>
</body>
</html>
